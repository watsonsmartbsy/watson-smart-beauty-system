<!DOCTYPE html>

<html>

<head>

```
<title>Edit Rule</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

<link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<link rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}">
```

</head>

<body>

<div class="container mt-5">

```
<div class="row justify-content-center">

    <div class="col-lg-8">

        <div class="card shadow-lg border-0 rounded-4">

            <div class="card-body p-5">

                <div class="text-center mb-4">

                    <i class="fa-solid fa-pen-to-square fa-3x mb-3"
                       style="color:#7E57C2;">
                    </i>

                    <h1 class="rules-title">

                        Edit Rule Engine

                    </h1>

                    <p class="text-muted">

                        Update an existing skin analysis rule.

                    </p>

                </div>

                <form
                    method="POST"
                    action="/worker/update_rule/{{ rule['id'] }}"
                >

                    <div class="mb-3">

                        <label class="form-label fw-bold">

                            Condition Name

                        </label>

                        <input
                            type="text"
                            name="condition_name"
                            class="form-control"
                            value="{{ rule['condition_name'] }}"
                            required
                        >

                    </div>

                    <div class="row">

                        <div class="col-md-6">

                            <label class="form-label fw-bold">

                                Min Brightness

                            </label>

                            <input
                                type="number"
                                step="0.01"
                                name="min_brightness"
                                class="form-control"
                                value="{{ rule['min_brightness'] }}"
                                required
                            >

                        </div>

                        <div class="col-md-6">

                            <label class="form-label fw-bold">

                                Max Brightness

                            </label>

                            <input
                                type="number"
                                step="0.01"
                                name="max_brightness"
                                class="form-control"
                                value="{{ rule['max_brightness'] }}"
                                required
                            >

                        </div>

                    </div>

                    <div class="row mt-3">

                        <div class="col-md-6">

                            <label class="form-label fw-bold">

                                Min Redness

                            </label>

                            <input
                                type="number"
                                step="0.01"
                                name="min_redness"
                                class="form-control"
                                value="{{ rule['min_redness'] }}"
                                required
                            >

                        </div>

                        <div class="col-md-6">

                            <label class="form-label fw-bold">

                                Max Redness

                            </label>

                            <input
                                type="number"
                                step="0.01"
                                name="max_redness"
                                class="form-control"
                                value="{{ rule['max_redness'] }}"
                                required
                            >

                        </div>

                    </div>

                    <div class="mt-4">

                        <label class="form-label fw-bold">

                            Recommendation Advice

                        </label>

                        <textarea
                            name="advice"
                            class="form-control"
                            rows="5"
                            required
                        >{{ rule['advice'] }}</textarea>

                    </div>

                    <div class="text-center mt-4">

                        <button
                            type="submit"
                            class="btn btn-rule-add btn-lg me-2"
                        >

                            <i class="fa-solid fa-floppy-disk"></i>

                            Update Rule

                        </button>

                        <a href="/worker/rules"
                           class="btn btn-outline-dark btn-lg">

                            <i class="fa-solid fa-arrow-left"></i>

                            Back

                        </a>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>
```

</div>

</body>

</html>
