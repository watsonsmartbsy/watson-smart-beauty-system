<!DOCTYPE html>

<html>

<head>
<title>Watson Beauty Advisory System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

<link rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}">

<link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

    .login-card{

        max-width:550px;

        margin:auto;

        margin-top:60px;

        border:none;

        border-radius:25px;

        background:white;

    }

    .logo{

        width:180px;

    }

    .system-title{

        color:var(--watsons-primary);

        font-weight:700;

        margin-bottom:0;

    }

    .subtitle{

        color:#6c757d;

        margin-bottom:0;

    }

</style>
```

</head>

<body class="user-dashboard">

<div class="container">

```
<div class="card login-card shadow-lg p-5">

    <div class="text-center mb-4">

        <img
            src="{{ url_for('static', filename='image/watson-logo.png') }}"
            class="logo mb-3"
            alt="Watsons Logo"
        >

        <h1 class="system-title">
            Watson Beauty
        </h1>

        <p class="subtitle">
            Advisory System
        </p>


    <form method="POST"
          action="/login">

        <div class="mb-3">

            <label class="form-label">

                Email Address

            </label>

            <input
                type="email"
                name="email"
                class="form-control"
                placeholder="Enter Email Address"
                required
            >

        </div>

        <div class="mb-4">

            <label class="form-label">

                Password

            </label>

            <input
                type="password"
                name="password"
                class="form-control"
                placeholder="Enter Password"
                required
            >

    </div>

        </div>
        
        {% if error %}

        <div class="alert alert-danger text-center">

            <i class="fa-solid fa-circle-exclamation"></i>

            {{ error }}

        </div>

        {% endif %}

        <button
            type="submit"
            class="btn btn-watson w-100 py-2">

            <i class="fa-solid fa-right-to-bracket"></i>

            Login

        </button>

    </form>

    <div class="text-center mt-4">

        <span class="text-muted">

            Don't have an account?

        </span>

        <br>

        <a href="/register"
           class="text-decoration-none">

            Register Here

        </a>

    </div>

</div>
```

</div>

</body>

</html>
