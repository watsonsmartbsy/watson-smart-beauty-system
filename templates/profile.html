<!DOCTYPE html>

<html>

<head>

    <title>My Profile</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body class="user-dashboard">

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-6">

            <div class="card shadow-lg border-0 rounded-4">

                <div class="card-body p-5 text-center">

                    <i class="fa-solid fa-circle-user fa-6x mb-4"
                       style="color:#009b9b;"></i>

                    <h2 class="fw-bold">

                        My Profile

                    </h2>

                    <p class="text-muted">

                        Account Information

                    </p>

                    <hr>

                    <div class="mb-4">

                        <h6 class="text-muted">

                            Full Name

                        </h6>

                        <h4>

                            {{ user['name'] }}

                        </h4>

                    </div>

                    <div class="mb-4">

                        <h6 class="text-muted">

                            Email Address

                        </h6>

                        <h5>

                            {{ user['email'] }}

                        </h5>

                    </div>

                    <div class="mb-4">

                        <h6 class="text-muted">

                            Role

                        </h6>

                        <span class="badge bg-success fs-6">

                            {{ user['role']|capitalize }}

                        </span>

                    </div>
                    <hr>

<div class="mb-4">

    <h6 class="text-muted">

        Total Skin Analyses

    </h6>

    <h2 style="color:#009b9b;">

        {{ total_analysis }}

    </h2>

</div>
                    <a href="/dashboard"
                       class="btn btn-watson btn-lg">

                        <i class="fa-solid fa-house"></i>

                        Back to Dashboard

                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>
