<!DOCTYPE html>
<html>
<head>
    <title>Create Worker</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="background-color:#41b9b9;">

<div class="container py-5">

    <div class="row align-items-center">

        <!-- LEFT SIDE -->

        <div class="col-lg-6">

            <div class="card shadow-lg border-0 rounded-4">

                <div class="card-body p-5">

                    <h2 class="fw-bold mb-3">

                        <i class="fa-solid fa-user-plus"
                           style="color:#009b9b;"></i>

                        Create Worker Account

                    </h2>

                    <p class="text-muted mb-4">

                        Register a new Watson worker who can manage products,
                        recommendations, customer feedback and system records.

                    </p>

                    <!-- PUT YOUR EXISTING FORM HERE -->

                   

                                    <form method="POST"
                    action="/admin/create_worker">

                    <div class="mb-3">

                        <label>Name</label>

                        <input
                            type="text"
                            name="name"
                            class="form-control"
                            required>

                    </div>

                    <div class="mb-3">

                        <label>Email</label>

                        <input
                            type="email"
                            name="email"
                            class="form-control"
                            required>

                    </div>

                    <div class="mb-3">

                        <label>Password</label>

                        <input
                            type="password"
                            name="password"
                            class="form-control"
                            required>

                    </div>
            <div class="d-flex gap-3 mt-4">

    <button type="submit"
            class="btn btn-success btn-lg">

        <i class="fa-solid fa-user-plus"></i>

        Create Worker

    </button>

    <a href="/admin"
       class="btn btn-watson btn-lg">

        <i class="fa-solid fa-house"></i>

        Dashboard

    </a>

</div>

    </form>

                 

                </div>

            </div>

        </div>

        <!-- RIGHT SIDE -->

        <div class="col-lg-6 text-center">

            <img src="{{ url_for('static',
                     filename='image/admin_worker.png') }}"
                 class="img-fluid"
                 style="max-height:500px;">

            <h3 class="mt-4">

                Watson Worker Portal

            </h3>

            <p class="text-muted">

                Manage skincare products, recommendation rules,
                customer analyses and feedback efficiently.

            </p>

        </div>

    </div>

</div>


</div>

</body>
</html>
