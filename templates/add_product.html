<!DOCTYPE html>

<html>

<head>

    <title>Add Product</title>


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">


    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">


    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
    
</head>



<body>


<div class="container mt-5 mb-5">


<div class="row justify-content-center">


<div class="col-lg-8">


<div class="card shadow-lg border-0 rounded-4">


<div class="card-body p-5">



<div class="text-center mb-4">


    <i class="fa-solid fa-box-open fa-3x mb-3"
       style="color:#F9A825;">
    </i>


    <h1 class="products-title">

        Add Watson Product

    </h1>


    <p class="text-muted">

        Add skincare product information

    </p>


</div>





<form
method="POST"
action="/worker/add_product"
enctype="multipart/form-data">





<!-- PRODUCT NAME -->

<div class="mb-3">


<label class="form-label fw-bold">

Product Name

</label>


<input
type="text"
name="product_name"
class="form-control"
required>


</div>








<!-- CATEGORY -->


<div class="mb-3">


<label class="form-label fw-bold">

Category

</label>


<select
name="category"
class="form-select"
required>


<option value="Cleanser">Cleanser</option>

<option value="Toner">Toner</option>

<option value="Serum">Serum</option>

<option value="Moisturizer">Moisturizer</option>

<option value="Sunscreen">Sunscreen</option>


</select>


</div>








<!-- SKIN TYPE -->


<div class="mb-3">


<label class="form-label fw-bold">

Skin Type

</label>


<select
name="skin_type"
class="form-select"
required>


<option value="">

Select Skin Type

</option>


<option value="Normal Skin">

Normal Skin

</option>


<option value="Dry Skin">

Dry Skin

</option>


<option value="Oily Skin">

Oily Skin

</option>


<option value="Combination Skin">

Combination Skin

</option>


<option value="Sensitive Skin">

Sensitive Skin

</option>


<option value="Acne / Skin Irritation">

Acne / Skin Irritation

</option>


<option value="Dehydrated Skin">

Dehydrated Skin

</option>


<option value="Hyperpigmentation">

Hyperpigmentation

</option>


<option value="Eczema">

Eczema

</option>


</select>


</div>










<!-- DESCRIPTION -->


<div class="mb-3">


<label class="form-label fw-bold">

Product Description

</label>


<textarea
name="description"
class="form-control"
rows="3"
required></textarea>


</div>









<!-- BENEFITS -->


<div class="mb-3">


<label class="form-label fw-bold">

Benefits

</label>


<textarea
name="benefits"
class="form-control"
rows="3"
required></textarea>


</div>








<!-- INGREDIENTS -->


<div class="mb-3">


<label class="form-label fw-bold">

Key Ingredients

</label>


<textarea
name="ingredients"
class="form-control"
rows="3"
required></textarea>


</div>









<!-- HOW TO USE -->


<div class="mb-3">


<label class="form-label fw-bold">

How To Use

</label>


<textarea
name="how_to_use"
class="form-control"
rows="3"
required></textarea>


</div>










<!-- PRICE -->


<div class="mb-3">


<label class="form-label fw-bold">

Price (RM)

</label>


<input
type="number"
step="0.01"
name="price"
class="form-control"
required>


</div>










<!-- IMAGE -->


<div class="mb-4">


<label class="form-label fw-bold">

Product Image

</label>


<input
type="file"
name="image"
class="form-control"
required>


</div>








<!-- BUTTON -->


<div class="text-center">


<button
type="submit"
class="btn btn-product-add btn-lg">


<i class="fa-solid fa-plus"></i>

Add Product


</button>



<a href="/worker"
class="btn btn-outline-dark btn-lg">


Dashboard


</a>


</div>





</form>


</div>

</div>

</div>

</div>


</div>


</body>


</html>
